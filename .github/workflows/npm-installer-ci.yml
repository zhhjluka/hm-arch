# Cross-platform verification for @hm-arch/installer.
# Runs npm build/test and packed-tarball smoke checks on macOS, Linux, and Windows.
# Does NOT publish to npm — publication requires explicit maintainer approval.

name: npm installer CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/npm-installer-ci.yml"
      - "packages/installer/**"
      - "src/hm_arch/_version.py"
      - "docs/npm-installer*.md"
  pull_request:
    paths:
      - ".github/workflows/npm-installer-ci.yml"
      - "packages/installer/**"
      - "src/hm_arch/_version.py"
      - "docs/npm-installer*.md"

concurrency:
  group: npm-installer-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm-installer:
    name: npm install/build/test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ["20"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: packages/installer/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Export HM_ARCH_PYTHON
        shell: bash
        run: |
          if command -v python3 >/dev/null 2>&1; then
            echo "HM_ARCH_PYTHON=$(command -v python3)" >> "$GITHUB_ENV"
          else
            echo "HM_ARCH_PYTHON=$(command -v python)" >> "$GITHUB_ENV"
          fi

      - name: npm ci
        working-directory: packages/installer
        run: npm ci

      - name: npm test (build, unit, integration, pack smoke)
        working-directory: packages/installer
        run: npm test

      - name: Packed tarball bin smoke (explicit)
        shell: bash
        working-directory: packages/installer
        run: |
          set -euo pipefail
          PACK_JSON="$(npm pack --json --silent)"
          TARBALL="$(node -e "const rows=JSON.parse(process.argv[1]); console.log(rows[0].filename)" "$PACK_JSON")"
          SMOKE_DIR="$(mktemp -d)"
          cleanup() { rm -rf "$SMOKE_DIR" "$TARBALL"; }
          trap cleanup EXIT
          npm init -y --silent --prefix "$SMOKE_DIR" >/dev/null
          npm install --prefix "$SMOKE_DIR" "$TARBALL" --silent
          "$SMOKE_DIR/node_modules/.bin/hm-arch-install" --help | grep -q hm-arch-install

  clean-machine-standalone:
    name: clean-machine npm (no Python at test time)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/installer/package-lock.json

      - name: Setup Python (build standalone fixture only)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build standalone hm-arch fixture
        run: uv run python scripts/build_standalone.py --clean

      - name: Export standalone fixture path
        run: echo "HM_ARCH_STANDALONE_FIXTURE=$GITHUB_WORKSPACE/dist/standalone/hm-arch" >> "$GITHUB_ENV"

      - name: npm ci
        working-directory: packages/installer
        run: npm ci

      - name: Clean-machine npm tests (no Python on PATH)
        working-directory: packages/installer
        run: node ./scripts/run-clean-machine-tests.mjs

      - name: Verify release version coordination
        run: uv run python scripts/verify_release_versions.py

  python-installer-smoke:
    name: Python installer CLI smoke (ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install hm-arch (editable)
        run: python -m pip install -e ".[dev]"

      - name: Run installer-related offline tests
        run: |
          python -m pytest \
            tests/test_codex_installer.py \
            tests/test_claude_code_installer.py \
            tests/test_integrations_cli_manage.py \
            -q
