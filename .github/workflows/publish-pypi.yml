# Publish hm-arch to PyPI after a version tag is pushed.
# This workflow waits for the GitHub Release workflow to attach wheel/sdist assets.

name: Publish PyPI

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: publish PyPI
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Wait for GitHub Release Python assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          for attempt in {1..60}; do
            if gh release view "$TAG" >/dev/null 2>&1; then
              if gh release download "$TAG" \
                --pattern "hm_arch-*.whl" \
                --pattern "hm_arch-*.tar.gz" \
                --dir dist \
                --clobber; then
                if ls dist/hm_arch-*.whl dist/hm_arch-*.tar.gz >/dev/null 2>&1; then
                  exit 0
                fi
              fi
            fi
            echo "Waiting for GitHub Release assets for ${TAG} (attempt ${attempt}/60)"
            sleep 30
          done
          echo "Timed out waiting for GitHub Release Python assets for ${TAG}" >&2
          exit 1

      - name: Check Python distribution metadata
        run: python -m pip install --upgrade twine && python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          password: ${{ secrets.PYPI_API_TOKEN }}
